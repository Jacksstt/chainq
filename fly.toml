# Minimal Fly.io deployment for chainq.
# Usage:
#   flyctl launch --copy-config --no-deploy   # adopt this config interactively
#   flyctl deploy
#
# The free Fly.io tier (Hobby) covers small chainq workloads. Data lives on
# a 3 GB volume; bump `size_gb` for heavier use.

app = "chainq"
primary_region = "nrt"

[build]
  dockerfile = "docker/Dockerfile.chainq"

[env]
  CHAINQ_DATA_DIR = "/data"
  NODE_ENV = "production"

[mounts]
  source = "chainq_data"
  destination = "/data"

[[services]]
  internal_port = 7900
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
