<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <title>chainq — onchain analytics for AI agents</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">
    <text x="80" y="200" font-size="120" font-weight="700" fill="#0F172A">chain<tspan fill="#2563EB">q</tspan></text>
  </g>
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto" fill="#0F172A">
    <text x="80" y="280" font-size="44" font-weight="600">Self-hosted onchain analytics.</text>
    <text x="80" y="335" font-size="44" font-weight="600">Designed for AI agents.</text>
  </g>
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto" fill="#475569">
    <text x="80" y="420" font-size="26">MCP-first &#8729; DuckDB + Parquet &#8729; dbt Spellbook fork</text>
    <text x="80" y="460" font-size="26">OSS &#8729; MIT &#8729; github.com/Jacksstt/chainq</text>
  </g>
  <g font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" fill="#1E293B">
    <rect x="80" y="500" width="1040" height="74" rx="8" fill="#0F172A"/>
    <text x="104" y="548" font-size="24" fill="#E2E8F0">$ claude mcp add chainq -- chainq mcp serve</text>
  </g>
</svg>
