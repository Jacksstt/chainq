<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chainq playground</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <header>
    <h1>chainq <span class="accent">playground</span></h1>
    <p class="tagline">
      DuckDB-WASM in your browser. No install, no server, no RPC.
      Paste a Parquet URL, write SQL, get rows.
    </p>
    <p class="tagline">
      Source:
      <a href="https://github.com/Jacksstt/chainq" target="_blank" rel="noopener">github.com/Jacksstt/chainq</a>
      &nbsp;·&nbsp;
      Press
      <kbd>⌘</kbd><kbd>↵</kbd>
      (or
      <kbd>Ctrl</kbd><kbd>↵</kbd>)
      to run the query.
    </p>
  </header>

  <main>
    <section class="row">
      <label for="parquet-url">Parquet URL</label>
      <input id="parquet-url"
             type="url"
             value="./sample.parquet"
             placeholder="https://.../dataset.parquet" />
      <button id="load-btn">Load</button>
    </section>

    <section class="row">
      <label for="sql">SQL</label>
      <textarea id="sql" rows="6" spellcheck="false">SELECT chain, COUNT(*) AS trades, AVG(amount_usd) AS avg_usd
FROM dataset
GROUP BY chain
ORDER BY trades DESC
LIMIT 50</textarea>
      <button id="run-btn" disabled>Run</button>
    </section>

    <section id="samples" class="samples" hidden>
      <span class="samples-label">Try:</span>
      <button class="sample-btn" type="button" data-action="head">Head 10 rows</button>
      <button class="sample-btn" type="button" data-action="count">Row count</button>
      <button class="sample-btn" type="button" data-action="schema">Columns &amp; types</button>
    </section>

    <section id="status" class="status">Ready. Paste a Parquet URL and press Load.</section>

    <section id="schema" class="schema" hidden></section>
    <section id="result"></section>
  </main>

  <footer>
    <p>Built by <a href="https://primebeat.jp" target="_blank" rel="noopener">Prime Beat</a>. MIT.</p>
  </footer>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
