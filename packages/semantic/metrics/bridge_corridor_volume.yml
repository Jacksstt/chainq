metric: bridge_corridor_volume
description: |
  Daily USD volume per (src_chain, dst_chain, bridge) corridor. Shows which
  cross-chain routes carry the most value over time.
dimensions:
  - src_chain
  - dst_chain
  - bridge
  - day
filters:
  - src_chain
  - dst_chain
  - bridge
sql_template: |
  SELECT
    {{select_dimensions}},
    COUNT(*) AS transfers,
    SUM(amount_usd) AS volume_usd
  FROM "bridge.transfers"
  WHERE amount_usd IS NOT NULL
    AND block_time BETWEEN {{start}} AND {{end}}
    {{src_chain_clause}}
    {{dst_chain_clause}}
    {{bridge_clause}}
  GROUP BY {{group_dimensions}}
  ORDER BY {{group_dimensions}}
dimension_expressions:
  src_chain: src_chain
  dst_chain: dst_chain
  bridge: bridge
  day: "date_trunc('day', block_time)"
guardrails:
  max_range_days: 90
  max_rows: 50000
  timeout_seconds: 20
