metric: lending_borrow_volume
description: |
  Daily borrow volume across lending protocols. Sums `amount_usd` for
  `event_kind = 'borrow'`. Useful as a leverage-demand signal.
dimensions:
  - chain
  - protocol
  - day
filters:
  - chain
  - protocol
sql_template: |
  SELECT
    {{select_dimensions}},
    COUNT(*) AS borrow_count,
    SUM(amount_usd) AS borrowed_usd
  FROM "lending.events"
  WHERE event_kind = 'borrow'
    AND amount_usd IS NOT NULL
    AND block_time BETWEEN {{start}} AND {{end}}
    {{chain_clause}}
    {{protocol_clause}}
  GROUP BY {{group_dimensions}}
  ORDER BY {{group_dimensions}}
dimension_expressions:
  chain: chain
  protocol: protocol
  day: "date_trunc('day', block_time)"
guardrails:
  max_range_days: 90
  max_rows: 50000
  timeout_seconds: 20
